database_path: ./data/feedback.db
report_dir: ./reports
lookback_hours: 48
# strict: 非 camera 直接丢弃；review: 全量保留并打标；off: 完全不做 camera 过滤
camera_filter_mode: strict

# Step 1: Camera-only topic definition
camera_keywords:
  - camera
  - photo
  - video
  - lens
  - zoom
  - focus
  - autofocus
  - exposure
  - night mode
  - portrait
  - stabilization
  - ois
  - eis
  - 相机
  - 拍照
  - 录像
  - 夜景
  - 对焦
  - 曝光
  - 人像
  - 防抖

camera_categories:
  画质:
    - 画质
    - photo quality
    - blurry
    - 模糊
    - 锐度
    - 细节
    - noise
    - 噪点
  对焦:
    - 对焦
    - autofocus
    - focus
    - 跑焦
  曝光:
    - 曝光
    - exposure
    - 过曝
    - 欠曝
  夜景:
    - 夜景
    - night mode
    - low light
    - 暗光
  人像:
    - 人像
    - portrait
    - bokeh
    - 背景虚化
  视频:
    - 视频
    - video
    - 录像
    - fps
    - frame drop
  防抖:
    - 防抖
    - stabilization
    - eis
    - ois
    - 抖动
  性能发热:
    - 发热
    - heating
    - lag
    - stutter
    - 卡顿
    - 闪退
  功能建议:
    - 建议
    - 希望
    - wishlist
    - feature request
    - please add

# Optional model/product hints to reduce irrelevant fetches before camera filtering.
product_keywords:
  - target phone
  - target os
  - device a
  - device a pro
  - device b
  - device b pro
  - model x
  - model x pro

dedupe:
  jaccard_threshold: 0.9
  lookback_days: 7

schedule:
  timezone: Asia/Shanghai
  hour: 0
  minute: 0

# Step 2: collectors
sources:
  nothing_community:
    enabled: true
    # 字段名沿用现有代码兼容；示例地址可替换成你的品牌社区
    base_url: https://community.example.com
    pages: 2
    # 如果希望品牌社区里的功能建议/系统问题也进入流水线，建议不要在这里先做 camera-only 过滤。
    include_keywords: []

  google_news:
    enabled: true
    query: '"Target Phone" (camera OR photo OR video OR review)'
    language: en-US
    country: US
    edition: US:en
    limit: 40
    fetch_article_body: true
    article_timeout_seconds: 10
    article_max_chars: 6000

  custom_rss:
    enabled: false
    fetch_article_body: true
    article_timeout_seconds: 10
    article_max_chars: 6000
    feeds:
      - name: Android Authority
        url: https://www.androidauthority.com/feed/
        include_keywords:
          - target
          - camera

  youtube:
    enabled: false
    api_key: ${YOUTUBE_API_KEY}
    query: "Target Phone camera review"
    limit: 30
    order: date
    region_code: US
    language: en
    include_keywords:
      - target
      - camera
      - review

  youtube_yt_dlp:
    enabled: true
    executable: yt-dlp
    queries:
      - "Target Phone camera review"
      - "Target Phone camera test"
      - "Target Device Pro camera review"
      - "Target Device Pro camera test"
      - "Target Device Ultra camera review"
      - "Target Device Ultra camera test"
    limit: 25
    timeout_seconds: 90
    include_keywords: [target, camera, photo, video, review, "device pro", "device ultra"]

  bilibili:
    enabled: false
    # 当前走公开 web 搜索接口，不依赖额外 token
    queries:
      - "Target Phone 相机 评测"
      - "Target Device Pro 相机 评测"
      - "Target Device Ultra 相机 评测"
      - "Target Phone camera review"
    limit: 40
    page_size: 20
    max_pages: 3
    order: pubdate
    timeout_seconds: 30
    include_keywords:
      - target
      - camera
      - photo
      - video
      - 相机
      - 拍照
      - 评测
      - 测评
      - 开箱

  x_twscrape:
    enabled: false
    # twscrape 账号池数据库路径（需先用 twscrape 登录账号）
    db_path: ./data/twscrape_accounts.db
    query: '"Target Phone" (camera OR photo OR video)'
    limit: 60
    include_keywords:
      - target
      - camera
      - photo
      - video

  x_api:
    enabled: false
    # 官方 X API（recent search 默认仅支持最近 7 天）
    bearer_token: ${X_BEARER_TOKEN}
    query: '"Target Phone" (camera OR photo OR video)'
    search_scope: recent
    limit: 50
    max_pages: 5
    timeout_seconds: 30
    exclude_retweets: true
    exclude_replies_in_search: true
    include_replies: true
    include_self_replies: true
    replies_per_post: 20
    max_total_replies: 200
    max_reply_pages: 3
    include_keywords:
      - target
      - camera
      - photo
      - video

  x_snscrape:
    enabled: false
    # 当 twscrape 不可用时可先用 snscrape 快速验证
    query: '"Target Phone" (camera OR photo OR video)'
    limit: 60
    timeout_seconds: 30
    nitter_instances:
      - https://nitter.net
      - https://nitter.poast.org
    include_keywords:
      - target
      - camera
      - photo
      - video

  instagram_instaloader:
    enabled: false
    # 可以填 hashtag 或 profile，两者至少一个
    hashtags:
      - targetphone
      - targetcamera
    profiles: []
    limit: 60
    timeout_seconds: 45
    include_keywords:
      - target
      - camera
      - photo
      - video
    # 可选：私有内容/更稳定抓取可配置账号
    username: ${INSTAGRAM_USERNAME}
    password: ${INSTAGRAM_PASSWORD}

  reddit:
    enabled: true
    client_id: ${REDDIT_CLIENT_ID}
    client_secret: ${REDDIT_CLIENT_SECRET}
    user_agent: MediaFeedbackPulse/1.0
    # 可选：为 Reddit 单独设置回溯窗口（天），不影响其他源
    lookback_days: 730
    subreddits:
      - TargetBrand
      - Android
      - Smartphone
    query: "target phone"
    limit: 120
    per_subreddit_limit: 80
    include_submissions: true
    include_comments: true
    # 若 OAuth 凭据为空/失效，自动降级到 pullpush（免 OAuth）
    allow_pullpush_fallback: true
    pullpush_base_url: https://api.pullpush.io/reddit/search
    pullpush_timeout_seconds: 30
    time_filter: month

  reddit_snscrape:
    enabled: false
    # 若 snscrape 在当前 Python 版本不可用，会自动降级到 reddit 公共接口抓取
    subreddits:
      - TargetBrand
      - Android
      - Smartphone
    query: '"Target Phone" (camera OR photo OR video)'
    limit: 80
    include_keywords:
      - target
      - camera
      - photo
      - video

  mock_file:
    enabled: false
    path: ./examples/sample_feedback.json

# Optional defaults for the `competitor-video` command.
competitor_video:
  targets:
    - Device A Pro
    - Device B Ultra
    - Device C Pro
  compare_to:
    - Target Device Pro
  platforms:
    - youtube
    - bilibili

# Step 3+: Local AI enrichment (可复用 videosummary 的本地 OpenAI 兼容 API)
local_ai:
  enabled: false
  # 例如本地 vLLM / Ollama OpenAI 兼容地址
  base_url: http://127.0.0.1:11434/v1
  api_key: local-key
  model: qwen2.5:14b-instruct
  temperature: 0.1
  max_tokens: 1800
  timeout_seconds: 90
  retries: 1
  # 推荐使用项目内 v2 标签 prompt（一级标签英文枚举 + severity 统一）
  prompt_path: ./prompts/deepseek_tagging_v2.md

# Video processing (manual + nightly auto)
video_processing:
  enabled: false
  videosummary_python: /path/to/videosummary/venv/bin/python
  videosummary_script: /path/to/videosummary/transcribe.py
  prompt_name: camera_feedback
  model_size: tiny
  timeout_seconds: 1800
  max_items_per_run: 8
  nightly_enabled: false
  nightly_hour: 0
  nightly_minute: 30
  nightly_timezone: Asia/Shanghai
  # YouTube 评论观点提炼（最新评论主导 + 热门补充）
  comment_mining_enabled: true
  comment_newest_limit: 500
  comment_top_limit: 120
  comment_timeout_seconds: 180
  # 仅对高价值评论调用模型，减少 token 消耗
  comment_ai_batch_size: 20
  comment_ai_max_candidates: 180
  comment_ai_max_p3: 100
  comment_ai_max_p2_negative: 50
  comment_max_points: 40

# Step 4: Bitable / workspace sync
lark:
  enabled: false
  base_url: https://open.feishu.cn
  app_id: ${LARK_APP_ID}
  app_secret: ${LARK_APP_SECRET}
  bitable_app_token: ${LARK_BITABLE_APP_TOKEN}
  bitable_table_id: ${LARK_BITABLE_TABLE_ID}
  # true 时只同步从未同步过的新记录；不会回刷旧记录
  only_sync_new_records: false
  # 自动补齐缺失字段（按文本字段创建），便于空表首次同步
  auto_create_fields: true
  field_mapping:
    feedback_uid: 反馈ID
    point_uid: 观点ID
    point_index: 观点序号
    point_source_code: 渠道缩写
    point_sentiment: 观点情绪
    point_severity: 观点严重级别
    point_text: 观点内容
    point_text_original: 观点原文
    point_language: 原文语言
    point_primary_tag: 一级标签
    point_secondary_tags: 二级标签
    point_timestamp: 观点时间点
    point_timestamp_seconds: 观点时间秒
    title: 标题
    url: 链接
    source: 平台
    source_section: 来源补充
    author: 作者
    published_at: 发布时间
    camera_category: 问题类型
    sentiment: 情绪
    sentiment_reason: 情绪依据
    severity: 严重级别
    source_actor_type: 来源身份
    source_actor_reason: 来源判断依据
    domain_subtags: 二级标签
    product_tags: 产品标签
    primary_product: 主产品
    platform_group: 平台大类
    published_date: 发布时间日期
    is_negative: 是否负向
    is_high_severity: 是否高严重
    camera_keyword_hits: 命中关键词
    video_candidate: 待补视频转写
    summary: 摘要
    content: 原文
    report_date: 入库日期
    status: 跟进状态

# Optional: daily summary email
email_summary:
  enabled: false
  # 若为 true，则 `run` 完成后自动发邮件；若你的日常流程是多步（如先 video-process 再 sync-lark），
  # 建议保持 false，并在最后单独执行 `send-email-summary`
  auto_send_after_run: false
  smtp_host: smtp.example.com
  smtp_port: 587
  smtp_username: ${EMAIL_SMTP_USERNAME}
  smtp_password: ${EMAIL_SMTP_PASSWORD}
  from_addr: ${EMAIL_FROM_ADDR}
  to_addrs:
    - you@example.com
  use_tls: true
  use_ssl: false
  subject_prefix: "[Media Feedback Pulse]"
